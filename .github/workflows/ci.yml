name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests (unit + calibration smoke checks)
        env:
          # The synthetic calibration tests are the fast backtest smoke check —
          # no network / FastF1 downloads required.
          PYTEST_DISABLE_PLUGIN_AUTOLOAD: "1"
        run: pytest tests/ -q
